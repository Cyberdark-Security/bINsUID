name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Smoke test CLI
        run: |
          binsuid --version | grep -F "1.1.7"
          binsuid --scan-only --quick --skip-sudo --skip-capabilities --skip-sgid --skip-persistence --json | head -20
          test "$(binsuid --json --scan-only --quick --skip-sudo --skip-capabilities --skip-sgid --skip-persistence >/dev/null 2>&1; echo $?)" -eq 0

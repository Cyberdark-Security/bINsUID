name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install nfpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.41.2/nfpm_2.41.2_amd64.deb -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - name: Install package and test deps
        run: pip install -e ".[dev]" build

      - name: Run tests
        run: pytest -v

      - name: Build Python sdist/wheel
        run: python -m build

      - name: Build Linux packages (deb, rpm)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export BINSUID_VERSION="$VERSION"
          nfpm package -f nfpm.yaml --target dist/ --packager deb
          nfpm package -f nfpm.yaml --target dist/ --packager rpm

      - name: Create source tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf "dist/binsuid_${VERSION}_all.tar.gz" \
            --exclude='.git' --exclude='dist' --exclude='.pytest_cache' \
            --exclude='*.egg-info' .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
